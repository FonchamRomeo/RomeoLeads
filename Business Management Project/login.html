<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - RomeoLeads</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .login-card { width: 380px; border-radius:18px; padding:28px; background:white; box-shadow:0 10px 30px rgba(2,6,23,0.2); }
        .brand { font-weight:700; color:#0f172a; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="mb-3">
            <i class="bi bi-shield-lock" style="font-size: 3rem; color: #2563eb;"></i>
        </div>
        <div class="mb-3 brand">RomeoLeads</div>
        <p class="text-muted">Staff login to access the RomeoLeads dashboard</p>
        <form id="loginForm" class="mt-3">
            <div class="mb-3">
                <input type="email" id="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <div id="errorMsg" class="text-danger mb-2" style="display:none; font-size:0.9rem;"></div>
            <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right"></i> Sign in</button>
        </form>
        <div class="mt-3 text-muted">
            <small>Use your RomeoLeads credentials to sign in.</small>
        </div>
        <div class="mt-3">
            <a href="index.html" class="btn btn-outline-secondary btn-sm">Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e){
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('password').value;
            const err = document.getElementById('errorMsg');
            // Fallback validation for RomeoLeads login page
            if(email === 'admin@romeoleads.com' && pwd === 'admin123'){
                // On success, go to main app (index.html)
                window.location.href = 'index.html';
            } else {
                err.style.display = 'block';
                err.textContent = 'Invalid credentials. Use demo credentials shown below.';
            }
        });
    </script>
</body>
</html>
